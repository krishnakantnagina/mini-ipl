{% extends "base.html" %}
{% block title %}Manage Teams{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h3 class="mb-0">Manage Teams</h3>
  <button class="btn btn-success" data-bs-toggle="collapse" data-bs-target="#addForm">+ Create team</button>
</div>

<div class="collapse mb-4" id="addForm">
  <div class="card card-body">
    <form method="post" class="row g-2">
      <div class="col-md-4"><input name="name" class="form-control" placeholder="Team name" required></div>
      <div class="col-md-2"><input name="short_name" class="form-control" placeholder="Short (e.g. CSK)" maxlength="8" required></div>
      <div class="col-md-4"><input name="owner_name" class="form-control" placeholder="Owner name" required></div>
      <div class="col-md-2"><button class="btn btn-success w-100">Create</button></div>
    </form>
  </div>
</div>

{% if teams %}
<div class="card">
  <table class="table table-hover mb-0">
    <thead><tr><th>Team</th><th>Short</th><th>Owner</th><th>Squad</th><th style="width:120px">Actions</th></tr></thead>
    <tbody>
      {% for t in teams %}
      <tr>
        <form method="post" action="{{ url_for('admin.edit_team', team_id=t.id) }}">
        <td><input name="name" class="form-control form-control-sm" value="{{ t.name }}"></td>
        <td><input name="short_name" class="form-control form-control-sm" value="{{ t.short_name }}" style="width:80px"></td>
        <td><input name="owner_name" class="form-control form-control-sm" value="{{ t.owner_name }}"></td>
        <td>{{ t.players | length }}</td>
        <td>
          <button class="btn btn-sm btn-primary">Save</button>
        </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% else %}
<p class="text-muted text-center my-5">No teams yet. Create the first one above.</p>
{% endif %}
{% endblock %}
