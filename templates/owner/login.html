{% extends "base.html" %}
{% block title %}Owner Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <div class="card">
      <div class="card-header fw-bold">Team Owner Login</div>
      <div class="card-body">
        <p class="text-muted">Use the owner ID and password the admin gave you.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Owner ID</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-warning w-100">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
